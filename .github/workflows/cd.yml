name: CD

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: Deployment target label
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none

      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Install Composer dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Generate application key
        run: php artisan key:generate

      - name: Set directory permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Run backend tests
        run: php artisan test

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.event.inputs.target_environment }}
          path: frontend/dist

  package-backend:
    name: Package Backend Source
    runs-on: ubuntu-latest
    needs: backend-tests

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Upload backend source artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-source-${{ github.event.inputs.target_environment }}
          path: |
            backend/app
            backend/bootstrap
            backend/config
            backend/database
            backend/public
            backend/resources
            backend/routes
            backend/storage
            backend/artisan
            backend/composer.json
            backend/composer.lock
            backend/phpunit.xml

  deploy-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-build
      - package-backend
    environment: ${{ github.event.inputs.target_environment }}

    steps:
      - name: Deployment handoff
        run: |
          echo "Validation and packaging completed for ${{ github.event.inputs.target_environment }}."
          echo "Frontend and backend artifacts are available in this workflow run."
          echo "Add host-specific deploy steps here once the production environment is chosen."
